version: '3.8'

services:
  # MCP Host Server
  mcp-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: a-modular-kingdom-mcp
    volumes:
      # Mount source for hot reload in development
      - ../src:/app/src
      # Persist memories across container restarts
      - mcp-memories:/root/.modular_kingdom
      # Mount Qdrant data if using local Qdrant
      - qdrant-data:/app/src/agent_qdrant_db
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_URL=${QDRANT_URL:-}
      - QDRANT_CLUSTER_NAME=${QDRANT_CLUSTER_NAME:-}
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - mcp-network

  # Development environment with Jupyter
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    container_name: a-modular-kingdom-dev
    volumes:
      - ..:/app
      - mcp-memories:/root/.modular_kingdom
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_URL=${QDRANT_URL:-}
      - QDRANT_CLUSTER_NAME=${QDRANT_CLUSTER_NAME:-}
    ports:
      - "8888:8888"  # Jupyter
      - "8001:8000"  # MCP server
    command: >
      sh -c "pip install jupyter &&
             jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''"
    networks:
      - mcp-network

  # Testing environment
  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: testing
    container_name: a-modular-kingdom-test
    volumes:
      - ..:/app
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_URL=${QDRANT_URL:-}
    networks:
      - mcp-network

  # Optional: Local Ollama instance
  ollama:
    image: ollama/ollama:latest
    container_name: a-modular-kingdom-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - mcp-network

volumes:
  mcp-memories:
    driver: local
  qdrant-data:
    driver: local
  ollama-data:
    driver: local

networks:
  mcp-network:
    driver: bridge
