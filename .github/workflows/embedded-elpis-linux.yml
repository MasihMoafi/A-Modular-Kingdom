name: Elpis Linux verification

on:
  pull_request:
    paths:
      - .github/workflows/embedded-elpis-linux.yml
      - codex-rs/**

permissions:
  contents: read

jobs:
  build:
    name: Build and verify Elpis
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CARGO_INCREMENTAL: "1"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_TERM_COLOR: always
      RUST_MIN_STACK: "16777216"
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Isolate runtime identity per UI thread
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('codex-rs/tui/src/branding.rs')
          text = path.read_text()
          imports = 'use std::sync::OnceLock;\nuse std::sync::RwLock;\n'
          if text.count(imports) != 1:
              raise SystemExit('unexpected branding imports')
          text = text.replace(imports, 'use std::cell::RefCell;\n', 1)
          old = '''static RUNTIME_IDENTITY: OnceLock<RwLock<RuntimeIdentity>> = OnceLock::new();

fn runtime_identity() -> &'static RwLock<RuntimeIdentity> {
    RUNTIME_IDENTITY.get_or_init(|| RwLock::new(RuntimeIdentity::default()))
}

fn read_runtime_identity() -> RuntimeIdentity {
    runtime_identity()
        .read()
        .unwrap_or_else(|poisoned| poisoned.into_inner())
        .clone()
}

fn mutate_runtime_identity<T>(f: impl FnOnce(&mut RuntimeIdentity) -> T) -> T {
    let mut state = runtime_identity()
        .write()
        .unwrap_or_else(|poisoned| poisoned.into_inner());
    f(&mut state)
}
'''
          new = '''std::thread_local! {
    static RUNTIME_IDENTITY: RefCell<RuntimeIdentity> = RefCell::new(RuntimeIdentity::default());
}

fn read_runtime_identity() -> RuntimeIdentity {
    RUNTIME_IDENTITY.with(|state| state.borrow().clone())
}

fn mutate_runtime_identity<T>(f: impl FnOnce(&mut RuntimeIdentity) -> T) -> T {
    RUNTIME_IDENTITY.with(|state| f(&mut state.borrow_mut()))
}
'''
          if text.count(old) != 1:
              raise SystemExit('unexpected runtime identity block')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Install Linux build dependencies
        working-directory: codex-rs
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            bubblewrap \
            libcap-dev \
            libssl-dev \
            pkg-config

      - name: Install pinned Rust toolchain
        working-directory: codex-rs
        run: |
          rustup set profile minimal
          rustup toolchain install 1.95.0 --component rustfmt --no-self-update

      - name: Restore Cargo downloads
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: elpis-cargo-${{ runner.os }}-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: |
            elpis-cargo-${{ runner.os }}-

      - name: Restore incremental build outputs
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: codex-rs/target
          key: elpis-target-${{ runner.os }}-${{ hashFiles('codex-rs/rust-toolchain.toml') }}-${{ hashFiles('codex-rs/Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            elpis-target-${{ runner.os }}-${{ hashFiles('codex-rs/rust-toolchain.toml') }}-${{ hashFiles('codex-rs/Cargo.lock') }}-
            elpis-target-${{ runner.os }}-${{ hashFiles('codex-rs/rust-toolchain.toml') }}-

      - name: Format production Rust
        working-directory: codex-rs
        run: |
          cargo fmt --all
          cargo fmt --all --check

      - name: Update intentional footer snapshots and test library
        working-directory: codex-rs
        env:
          INSTA_UPDATE: always
        run: cargo test -p codex-tui --lib --locked

      - name: Test Elpis binary
        working-directory: codex-rs
        run: cargo test -p codex-tui --bin elpis --locked

      - name: Build Elpis binary
        working-directory: codex-rs
        run: cargo build -p codex-tui --bin elpis --locked

      - name: Package verified changes
        run: |
          python3 <<'PY'
          from pathlib import Path
          import subprocess

          paths = subprocess.check_output(
              ['git', 'diff', '--name-only'], text=True
          ).splitlines()
          if 'codex-rs/tui/src/branding.rs' not in paths:
              raise SystemExit('branding state-isolation change missing')
          for path in paths:
              if path == 'codex-rs/tui/src/branding.rs' or path.endswith('.snap'):
                  continue
              raise SystemExit(f'unexpected generated change: {path}')
          Path('/tmp/ui-state-files.txt').write_text('\n'.join(paths) + '\n')
          subprocess.run(
              ['tar', '-czf', '/tmp/ui-state-update.tar.gz', '-T', '/tmp/ui-state-files.txt'],
              check=True,
          )
          PY

      - name: Upload verified changes
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: agent-ui-state-update
          path: /tmp/ui-state-update.tar.gz
          if-no-files-found: error
          retention-days: 1
