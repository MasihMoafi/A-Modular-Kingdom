name: Elpis Linux verification

on:
  workflow_dispatch:
    inputs:
      full_regression:
        description: Run the exhaustive inherited-regression checks
        required: false
        default: true
        type: boolean
  pull_request:
    paths:
      - .github/workflows/embedded-elpis-linux.yml
      - codex-rs/**
      - scripts/install-elpis-binary.sh
      - scripts/install-elpis.sh
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - .github/workflows/embedded-elpis-linux.yml
      - codex-rs/**
      - scripts/install-elpis-binary.sh
      - scripts/install-elpis.sh
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

concurrency:
  group: elpis-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and verify Elpis
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_INCREMENTAL: "1"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout integration head
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/product-integration'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/product-integration
          fetch-depth: 0

      - name: Checkout source
        if: github.event_name != 'pull_request' || github.head_ref != 'agent/product-integration'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Linux build dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            bubblewrap \
            libcap-dev \
            libssl-dev \
            pkg-config

      - name: Install pinned Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install 1.95.0 --component rustfmt --no-self-update

      - name: Materialize reviewed integration source
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/product-integration' && hashFiles('.github/finalizer/chunk-00') != ''
        working-directory: .
        run: |
          cat .github/finalizer/chunk-* | base64 -d > /tmp/elpis-finalize-ui.py
          python3 /tmp/elpis-finalize-ui.py
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str, label: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"expected one {label} in {path}, found {count}")
              file.write_text(text.replace(old, new, 1))

          remote = "codex-rs/config/src/thread_config/remote.rs"
          replace_once(
              remote,
              "Ok(proto::WireApi::Responses) => WireApi::Responses,\n",
              "Ok(proto::WireApi::Responses) => WireApi::Responses,\n"
              "        Ok(proto::WireApi::AnthropicMessages) => WireApi::AnthropicMessages,\n"
              "        Ok(proto::WireApi::GeminiGenerateContent) => WireApi::GeminiGenerateContent,\n",
              "remote wire API decode arm",
          )
          replace_once(
              remote,
              "WireApi::Responses => proto::WireApi::Responses,\n",
              "WireApi::Responses => proto::WireApi::Responses,\n"
              "        WireApi::AnthropicMessages => proto::WireApi::AnthropicMessages,\n"
              "        WireApi::GeminiGenerateContent => proto::WireApi::GeminiGenerateContent,\n",
              "remote wire API encode arm",
          )
          replace_once(
              remote,
              "    fn proto_sources() -> Vec<proto::ThreadConfigSource> {\n",
              "    #[test]\n"
              "    fn native_wire_apis_roundtrip_through_remote_config() {\n"
              "        for wire_api in [\n"
              "            WireApi::AnthropicMessages,\n"
              "            WireApi::GeminiGenerateContent,\n"
              "        ] {\n"
              "            let mut expected = expected_provider();\n"
              "            expected.wire_api = wire_api;\n"
              "            let proto = model_provider_to_proto(\"native\", expected.clone());\n"
              "            let (id, actual) = model_provider_from_proto(proto)\n"
              "                .expect(\"native model provider from proto\");\n"
              "            assert_eq!(id, \"native\");\n"
              "            assert_eq!(actual, expected);\n"
              "        }\n"
              "    }\n\n"
              "    fn proto_sources() -> Vec<proto::ThreadConfigSource> {\n",
              "remote native wire API regression insertion point",
          )

          proto = "codex-rs/config/src/thread_config/proto/codex.thread_config.v1.proto"
          replace_once(
              proto,
              "  WIRE_API_RESPONSES = 1;\n",
              "  WIRE_API_RESPONSES = 1;\n"
              "  WIRE_API_ANTHROPIC_MESSAGES = 2;\n"
              "  WIRE_API_GEMINI_GENERATE_CONTENT = 3;\n",
              "protobuf wire API value",
          )

          generated = "codex-rs/config/src/thread_config/proto/codex.thread_config.v1.rs"
          replace_once(
              generated,
              "    Responses = 1,\n",
              "    Responses = 1,\n"
              "    AnthropicMessages = 2,\n"
              "    GeminiGenerateContent = 3,\n",
              "generated wire API variant",
          )
          replace_once(
              generated,
              "            Self::Responses => \"WIRE_API_RESPONSES\",\n",
              "            Self::Responses => \"WIRE_API_RESPONSES\",\n"
              "            Self::AnthropicMessages => \"WIRE_API_ANTHROPIC_MESSAGES\",\n"
              "            Self::GeminiGenerateContent => \"WIRE_API_GEMINI_GENERATE_CONTENT\",\n",
              "generated wire API name",
          )
          replace_once(
              generated,
              "            \"WIRE_API_RESPONSES\" => Some(Self::Responses),\n",
              "            \"WIRE_API_RESPONSES\" => Some(Self::Responses),\n"
              "            \"WIRE_API_ANTHROPIC_MESSAGES\" => Some(Self::AnthropicMessages),\n"
              "            \"WIRE_API_GEMINI_GENERATE_CONTENT\" => Some(Self::GeminiGenerateContent),\n",
              "generated wire API parser",
          )
          PY

      - name: Check Rust formatting
        run: |
          cargo fmt --all
          cargo fmt --all --check

      - name: Restore Cargo downloads
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: elpis-cargo-${{ runner.os }}-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: |
            elpis-cargo-${{ runner.os }}-

      - name: Restore incremental build outputs
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: codex-rs/target
          key: elpis-target-${{ runner.os }}-${{ hashFiles('codex-rs/rust-toolchain.toml') }}-${{ hashFiles('codex-rs/Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            elpis-target-${{ runner.os }}-${{ hashFiles('codex-rs/rust-toolchain.toml') }}-${{ hashFiles('codex-rs/Cargo.lock') }}-
            elpis-target-${{ runner.os }}-${{ hashFiles('codex-rs/rust-toolchain.toml') }}-

      - name: Verify Elpis launcher and provider entrypoints
        run: cargo test -p codex-tui --bin elpis --locked

      - name: Verify context lifecycle and archive failure safety
        run: |
          cargo test -p codex-core --lib --locked context_cleaner::tests
          cargo test -p codex-core --lib --locked elpis_context::tests
          cargo test -p codex-memories-write --locked reset_memory_workspace_baseline_

      - name: Verify memory promotion, bounds, and retrieval
        run: |
          cargo test -p codex-state --locked record_stage1_output_usage_updates_usage_metadata
          cargo test -p codex-memories-write --locked sync_rollout_summaries_and_raw_memories_file_keeps_latest_memories_only
          cargo test -p codex-memories-write --locked validate_consolidation_artifacts_
          cargo test -p codex-config --locked memories_config_preserves_configured_root
          cargo test -p codex-state --locked init_with_memories_state_root_separates_only_memories_db
          cargo test -p codex-memories-extension --locked local::search::tests

      - name: Verify provider protocol and authentication boundaries
        run: |
          cargo test -p codex-model-provider-info --locked
          cargo test -p codex-core --lib --locked chat_completions

      - name: Verify runtime identity surfaces
        run: |
          cargo test -p codex-tui --lib --locked branding::tests
          cargo test -p codex-tui --lib --locked slash_command::tests

      - name: Run exhaustive continuity regression
        if: ${{ github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.full_regression) }}
        run: |
          cargo test -p codex-app-server --test all --locked memory_reset_clears_memory_files_and_rows_preserves_threads
          cargo test -p codex-tui --lib --locked elpis_context::tests
          cargo test -p codex-core --lib --locked elpis_context::tests
          cargo test -p codex-tui --lib --locked --no-run
          cargo test -p codex-tui --lib --locked onboarding::welcome::tests::welcome_renders_animation_on_first_draw -- --exact
          cargo test -p codex-tui --lib --locked chatwidget::tests::slash_commands::rag_command_routes_

      - name: Build Elpis binary and Cargo timing report
        run: cargo build -p codex-tui --bin elpis --locked --timings --release

      - name: Verify executable identity
        run: |
          target/release/elpis --help
          test "$(target/release/elpis --version)" = "elpis 0.1.1"

      - name: Commit verified integration source
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/product-integration' && hashFiles('.github/finalizer/chunk-00') != ''
        working-directory: .
        run: |
          git config user.name "elpis-integration-agent"
          git config user.email "elpis-integration-agent@users.noreply.github.com"
          git rm .github/workflows/integration-finalize.yml \
            .github/workflows/integration-observer.yml \
            .github/patches/elpis-ui-final.patch
          git rm -r .github/finalizer
          git add codex-rs/config/src/thread_config/remote.rs \
            codex-rs/config/src/thread_config/proto/codex.thread_config.v1.proto \
            codex-rs/config/src/thread_config/proto/codex.thread_config.v1.rs \
            codex-rs/tui/src/branding.rs \
            codex-rs/tui/src/chatwidget/model_popups.rs \
            codex-rs/tui/src/chatwidget/protocol.rs \
            codex-rs/tui/src/chatwidget/status_surfaces.rs
          git diff --cached --check
          git commit -m "fix: finalize integration source"
          git push origin HEAD:agent/product-integration

      - name: Reduce artifact size
        run: strip target/release/elpis

      - name: Upload Elpis binary
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: elpis-linux-x86_64
          path: codex-rs/target/release/elpis
          if-no-files-found: error
          retention-days: 7

      - name: Package .deb
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cargo install cargo-deb --locked
          cargo deb --no-build -p codex-tui

      - name: Upload Elpis .deb
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: elpis-deb
          path: codex-rs/target/debian/*.deb
          if-no-files-found: error
          retention-days: 7

      - name: Upload Cargo timing report
        if: ${{ always() && github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: elpis-cargo-timings
          path: codex-rs/target/cargo-timings/cargo-timing.html
          if-no-files-found: warn
          retention-days: 7

  release:
    name: Publish tagged Linux binary
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download verified Elpis binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: elpis-linux-x86_64
          path: dist

      - name: Download Elpis .deb
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: elpis-deb
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv dist/elpis dist/elpis-linux-x86_64
          (cd dist && sha256sum elpis-linux-x86_64 > elpis-linux-x86_64.sha256)
          for deb in dist/*.deb; do
            (cd dist && sha256sum "$(basename "$deb")" > "$(basename "$deb").sha256")
          done
          # Re-tagging the same version must replace the release, not fail on it;
          # this runs only after build+tests pass, so the old release stays live
          # until a verified replacement is seconds away.
          gh release delete "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --yes || true
          gh release create "$GITHUB_REF_NAME" \
            dist/elpis-linux-x86_64 \
            dist/elpis-linux-x86_64.sha256 \
            dist/*.deb \
            dist/*.deb.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --generate-notes \
            --title "Elpis $GITHUB_REF_NAME"
