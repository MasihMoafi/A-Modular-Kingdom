name: Finalize PR 28 provider slice

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.number == 28 && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/elpis-provider-entrypoints'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout trusted branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/elpis-provider-entrypoints
          fetch-depth: 0

      - name: Install Linux build dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            bubblewrap \
            libcap-dev \
            libssl-dev \
            pkg-config

      - name: Install pinned Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install 1.95.0 --component rustfmt --no-self-update

      - name: Apply focused patch
        run: python3 scripts/apply-elpis-identity-provider-slice.py

      - name: Format Rust
        working-directory: codex-rs
        run: cargo fmt --all

      - name: Verify provider entrypoints
        working-directory: codex-rs
        run: cargo test -p codex-tui --bin elpis --locked

      - name: Verify slash-command subtraction
        working-directory: codex-rs
        run: cargo test -p codex-tui --lib --locked slash_command::tests

      - name: Compile focused TUI tests
        working-directory: codex-rs
        run: cargo test -p codex-tui --lib --locked --no-run

      - name: Verify patch cleanliness
        run: git diff --check

      - name: Commit tested slice
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/apply-elpis-identity-provider-slice.py
          git rm .github/workflows/apply-elpis-provider-slice.yml
          git rm docs/.provider-slice-pr-trigger
          git rm docs/PROVIDER_SLICE_REVIEW.md
          git add -A
          git commit -m "feat(elpis): distinguish provider and identity surfaces"
          git push origin HEAD:agent/elpis-provider-entrypoints
