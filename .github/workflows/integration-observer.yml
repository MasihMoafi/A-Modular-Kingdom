name: Observe Elpis integration finalizer

on:
  push:
    branches:
      - agent/product-integration

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Report finalizer state on PR 48
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          marker='<!-- elpis-finalizer-run -->'
          update_comment() {
            body="$1"
            comment_id="$(
              gh api "repos/$GITHUB_REPOSITORY/issues/48/comments" --paginate \
                --jq ".[] | select(.body | contains(\"$marker\")) | .id" | tail -n 1
            )"
            if [[ -n "$comment_id" ]]; then
              gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" \
                -f body="$body" >/dev/null
            else
              gh api --method POST "repos/$GITHUB_REPOSITORY/issues/48/comments" \
                -f body="$body" >/dev/null
            fi
          }

          update_comment "$marker Final integration verification is queued for commit \`$GITHUB_SHA\`."

          for _ in $(seq 1 180); do
            run="$(
              gh api "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$GITHUB_SHA&per_page=100" \
                --jq ".workflow_runs[] | select(.name == \"Finalize Elpis integration\") | [.id, .status, (.conclusion // \"pending\"), .html_url] | @tsv" \
                | tail -n 1
            )"
            if [[ -n "$run" ]]; then
              IFS=$'\t' read -r run_id status conclusion url <<<"$run"
              update_comment "$marker Final integration verification: **$status / $conclusion** — run [$run_id]($url), commit \`$GITHUB_SHA\`."
              if [[ "$status" == "completed" ]]; then
                exit 0
              fi
            fi
            sleep 30
          done

          update_comment "$marker Final integration verification status could not be resolved before the observer timeout for commit \`$GITHUB_SHA\`."
