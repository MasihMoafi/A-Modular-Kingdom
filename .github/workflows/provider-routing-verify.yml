name: Provider routing verification

on:
  push:
    branches:
      - agent/provider-routing

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Test provider metadata
        run: cargo test -p codex-model-provider-info --locked

      - name: Test provider request translation
        run: cargo test -p codex-core --lib --locked chat_completions

      - name: Test Elpis TUI
        run: cargo test -p codex-tui --bin elpis --locked

      - name: Build Elpis
        run: cargo build -p codex-tui --bin elpis --locked

      - name: Export exact source revision
        if: always()
        working-directory: .
        run: git archive --format=tar.gz --output=/tmp/elpis-provider-routing-source.tar.gz HEAD

      - name: Upload source and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-routing-verification
          path: /tmp/elpis-provider-routing-source.tar.gz
          retention-days: 1

      - name: Remove temporary verification workflow
        if: success()
        working-directory: .
        run: |
          git config user.name "provider-routing-agent"
          git config user.email "provider-routing-agent@users.noreply.github.com"
          git rm .github/workflows/provider-routing-verify.yml
          git commit -m "chore: remove temporary provider routing verifier"
          git push origin HEAD:agent/provider-routing
