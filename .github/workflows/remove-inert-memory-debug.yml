# One-time surgical migration; deletes itself after success.
name: Remove inert memory debug commands

on:
  push:
    branches:
      - agent/remove-inert-memory-debug-commands

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Remove exact inert references
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path("codex-rs/tui/src/chatwidget/slash_dispatch.rs"): [
                  '''            SlashCommand::MemoryDrop => {
                      self.add_app_server_stub_message("Memory maintenance");
                  }
                  SlashCommand::MemoryUpdate => {
                      self.add_app_server_stub_message("Memory maintenance");
                  }
          ''',
              ],
              Path("codex-rs/tui/src/chatwidget/tests/slash_commands.rs"): [
                  '''#[tokio::test]
          async fn slash_memory_drop_reports_stubbed_feature() {
              let (mut chat, mut rx, mut op_rx) = make_chatwidget_manual(/*model_override*/ None).await;

              chat.dispatch_command(SlashCommand::MemoryDrop);

              let event = rx.try_recv().expect("expected unsupported-feature error");
              match event {
                  AppEvent::InsertHistoryCell(cell) => {
                      let rendered = lines_to_single_string(&cell.display_lines(/*width*/ 80));
                      assert!(rendered.contains("Memory maintenance: Not available in TUI yet."));
                  }
                  other => panic!("expected InsertHistoryCell error, got {other:?}"),
              }
              assert!(
                  op_rx.try_recv().is_err(),
                  "expected no memory op to be sent"
              );
          }

          ''',
                  '''#[tokio::test]
          async fn slash_memory_update_reports_stubbed_feature() {
              let (mut chat, mut rx, mut op_rx) = make_chatwidget_manual(/*model_override*/ None).await;

              chat.dispatch_command(SlashCommand::MemoryUpdate);

              let event = rx.try_recv().expect("expected unsupported-feature error");
              match event {
                  AppEvent::InsertHistoryCell(cell) => {
                      let rendered = lines_to_single_string(&cell.display_lines(/*width*/ 80));
                      assert!(rendered.contains("Memory maintenance: Not available in TUI yet."));
                  }
                  other => panic!("expected InsertHistoryCell error, got {other:?}"),
              }
              assert!(
                  op_rx.try_recv().is_err(),
                  "expected no memory op to be sent"
              );
          }

          ''',
              ],
          }

          for path, blocks in replacements.items():
              text = path.read_text()
              for block in blocks:
                  count = text.count(block)
                  if count != 1:
                      raise SystemExit(f"expected one exact block in {path}, found {count}")
                  text = text.replace(block, "")
              path.write_text(text)

          Path(".github/workflows/remove-inert-memory-debug.yml").unlink()
          PY

      - name: Commit surgical deletion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add codex-rs/tui/src/chatwidget/slash_dispatch.rs \
            codex-rs/tui/src/chatwidget/tests/slash_commands.rs \
            .github/workflows/remove-inert-memory-debug.yml
          git commit -m "chore(tui): remove inert memory debug dispatch"
          git push
