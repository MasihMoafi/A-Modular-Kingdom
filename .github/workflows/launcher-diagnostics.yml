name: Elpis launcher diagnostics

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: elpis-launcher-diagnostics
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.head_ref == 'agent/product-integration'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout integration head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/product-integration

      - name: Install Linux build dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            bubblewrap libcap-dev libssl-dev pkg-config

      - name: Install pinned Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install 1.95.0 --component rustfmt --no-self-update

      - name: Restore Cargo caches
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            codex-rs/target
          key: elpis-launcher-diagnostic-${{ runner.os }}-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: |
            elpis-target-${{ runner.os }}-
            elpis-cargo-${{ runner.os }}-

      - name: Materialize reviewed integration source
        run: |
          cat .github/finalizer/chunk-* | base64 -d > /tmp/elpis-finalize-ui.py
          python3 /tmp/elpis-finalize-ui.py
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"expected one match in {path}, found {count}")
              file.write_text(text.replace(old, new, 1))

          facade = "codex-rs/app-server-client/src/lib.rs"
          if "pub mod context_cleaner" not in Path(facade).read_text():
              replace_once(
                  facade,
                  "    pub mod config {\n",
                  "    pub mod context_cleaner {\n"
                  "        pub use codex_core::context_cleaner::eviction_count;\n"
                  "        pub use codex_core::context_cleaner::latest_eviction_event;\n"
                  "    }\n\n"
                  "    pub mod config {\n",
              )

          remote = "codex-rs/config/src/thread_config/remote.rs"
          replace_once(
              remote,
              "Ok(proto::WireApi::Responses) => WireApi::Responses,\n",
              "Ok(proto::WireApi::Responses) => WireApi::Responses,\n"
              "        Ok(proto::WireApi::AnthropicMessages) => WireApi::AnthropicMessages,\n"
              "        Ok(proto::WireApi::GeminiGenerateContent) => WireApi::GeminiGenerateContent,\n",
          )
          replace_once(
              remote,
              "WireApi::Responses => proto::WireApi::Responses,\n",
              "WireApi::Responses => proto::WireApi::Responses,\n"
              "        WireApi::AnthropicMessages => proto::WireApi::AnthropicMessages,\n"
              "        WireApi::GeminiGenerateContent => proto::WireApi::GeminiGenerateContent,\n",
          )
          replace_once(
              "codex-rs/config/src/thread_config/proto/codex.thread_config.v1.proto",
              "  WIRE_API_RESPONSES = 1;\n",
              "  WIRE_API_RESPONSES = 1;\n"
              "  WIRE_API_ANTHROPIC_MESSAGES = 2;\n"
              "  WIRE_API_GEMINI_GENERATE_CONTENT = 3;\n",
          )
          generated = "codex-rs/config/src/thread_config/proto/codex.thread_config.v1.rs"
          replace_once(
              generated,
              "    Responses = 1,\n",
              "    Responses = 1,\n"
              "    AnthropicMessages = 2,\n"
              "    GeminiGenerateContent = 3,\n",
          )
          replace_once(
              generated,
              "            Self::Responses => \"WIRE_API_RESPONSES\",\n",
              "            Self::Responses => \"WIRE_API_RESPONSES\",\n"
              "            Self::AnthropicMessages => \"WIRE_API_ANTHROPIC_MESSAGES\",\n"
              "            Self::GeminiGenerateContent => \"WIRE_API_GEMINI_GENERATE_CONTENT\",\n",
          )
          replace_once(
              generated,
              "            \"WIRE_API_RESPONSES\" => Some(Self::Responses),\n",
              "            \"WIRE_API_RESPONSES\" => Some(Self::Responses),\n"
              "            \"WIRE_API_ANTHROPIC_MESSAGES\" => Some(Self::AnthropicMessages),\n"
              "            \"WIRE_API_GEMINI_GENERATE_CONTENT\" => Some(Self::GeminiGenerateContent),\n",
          )
          PY
          cd codex-rs
          cargo fmt --all
          cargo fmt --all --check

      - name: Capture launcher compiler output
        id: launcher
        continue-on-error: true
        working-directory: codex-rs
        shell: bash
        run: |
          set +e
          cargo test -p codex-tui --bin elpis --locked > /tmp/elpis-launcher.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 120 /tmp/elpis-launcher.log
          exit "$status"

      - name: Upload launcher diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: elpis-launcher-diagnostics
          path: /tmp/elpis-launcher.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce launcher gate
        if: steps.launcher.outcome == 'failure'
        run: exit 1
