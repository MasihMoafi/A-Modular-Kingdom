name: One-shot integration finalizer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: elpis-integration-finalizer
  cancel-in-progress: true

jobs:
  finalize:
    if: github.head_ref == 'agent/product-integration'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout integration head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/product-integration
          fetch-depth: 0

      - name: Install Linux build dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            bubblewrap libcap-dev libssl-dev pkg-config

      - name: Install pinned Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install 1.95.0 --component rustfmt --no-self-update

      - name: Apply final integration corrections
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f"missing expected {label} anchor")
              return text.replace(old, new, 1)

          branding = Path("codex-rs/tui/src/branding.rs")
          s = branding.read_text()
          s = replace_once(
              s,
              "use ratatui::style::Style;",
              "use codex_model_provider_info::WireApi;\nuse ratatui::style::Style;",
              "branding import",
          )
          s = replace_once(
              s,
              '''    pub(crate) fn long_label(self) -> &'static str {
                  match self {
                      Self::Native => "native Responses route",
                      Self::Compatibility => "OpenAI-compatible Responses route",
                  }
              }
          ''',
              '''    pub(crate) fn long_label(self) -> &'static str {
                  match self {
                      Self::Native => "native provider protocol",
                      Self::Compatibility => "OpenAI-compatible Responses route",
                  }
              }

              pub(crate) fn for_provider(
                  provider_id: &str,
                  provider_name: &str,
                  wire_api: WireApi,
                  custom_openai_base_url: bool,
              ) -> Self {
                  match wire_api {
                      WireApi::AnthropicMessages | WireApi::GeminiGenerateContent => Self::Native,
                      WireApi::Responses => {
                          let is_openai = provider_id.trim().eq_ignore_ascii_case("openai")
                              || provider_name.trim().eq_ignore_ascii_case("openai");
                          if is_openai && !custom_openai_base_url {
                              Self::Native
                          } else {
                              Self::Compatibility
                          }
                      }
                  }
              }
          ''',
              "provider route implementation",
          )
          s = replace_once(
              s,
              "    eviction_count: u64,\n    latest_eviction: Option<EvictionNotice>,",
              "    eviction_count: u64,\n    cleaner_eviction_count: usize,\n    latest_eviction: Option<EvictionNotice>,",
              "cleaner eviction state",
          )
          s = replace_once(
              s,
              "            eviction_count: 0,\n            latest_eviction: None,",
              "            eviction_count: 0,\n            cleaner_eviction_count: 0,\n            latest_eviction: None,",
              "cleaner eviction default",
          )
          marker = "\npub(crate) fn record_model_reroute(from_model: &str, to_model: &str) {"
          cleaner = '''
          pub(crate) fn sync_context_eviction(count: usize, event: Option<&str>) -> bool {
              mutate_runtime_identity(|state| {
                  if count <= state.cleaner_eviction_count {
                      return false;
                  }
                  let delta = count - state.cleaner_eviction_count;
                  state.cleaner_eviction_count = count;
                  state.eviction_count = state.eviction_count.saturating_add(delta as u64);
                  let event = event.unwrap_or("ELPIS continuity: compacted older tool output");
                  let evidence = event
                      .split_once("exact evidence:")
                      .map(|(_, evidence)| evidence.trim())
                      .filter(|evidence| !evidence.is_empty())
                      .unwrap_or("rollout://tool-call/unavailable")
                      .to_string();
                  state.latest_eviction = Some(EvictionNotice {
                      count: state.eviction_count,
                      reason: "tool output compacted".to_string(),
                      evidence,
                  });
                  state.latest_continuity = Some("tool evidence compacted".to_string());
                  true
              })
          }
          '''
          if marker not in s:
              raise SystemExit("missing context eviction insertion anchor")
          s = s.replace(marker, cleaner + marker, 1)
          evict_block = '''    push_field(
                  &mut spans,
                  "evict",
                  &eviction,
                  crate::style::status_symbol_style(),
              );
          '''
          s = replace_once(
              s,
              evict_block,
              evict_block + '''    if let Some(latest) = state.latest_eviction.as_ref() {
                  push_field(
                      &mut spans,
                      "evidence",
                      &latest.evidence,
                      crate::style::status_symbol_style(),
                  );
              }
          ''',
              "eviction evidence field",
          )
          s = replace_once(
              s,
              '''        "context compaction" => "compact",
                  other => other,
          ''',
              '''        "context compaction" => "compact",
                  "tool output compacted" => "tool",
                  other => other,
          ''',
              "compact reason",
          )
          s = replace_once(
              s,
              '"ELPIS runtime · provider OpenAI/native · model gpt-5.6 · ctx 41% · memory 6 refs · evict 2:compact"',
              '"ELPIS runtime · provider OpenAI/native · model gpt-5.6 · ctx 41% · memory 6 refs · evict 2:compact · evidence thread:t/turn:u"',
              "identity expectation",
          )
          s = replace_once(
              s,
              'assert_eq!(ProviderRoute::Native.long_label(), "native Responses route");',
              'assert_eq!(ProviderRoute::Native.long_label(), "native provider protocol");',
              "native route expectation",
          )
          test_anchor = '''        assert_eq!(
                      ProviderRoute::Compatibility.long_label(),
                      "OpenAI-compatible Responses route"
                  );
              }
          '''
          s = replace_once(
              s,
              test_anchor,
              '''        assert_eq!(
                      ProviderRoute::Compatibility.long_label(),
                      "OpenAI-compatible Responses route"
                  );
                  assert_eq!(
                      ProviderRoute::for_provider(
                          "anthropic",
                          "Anthropic Claude (native)",
                          WireApi::AnthropicMessages,
                          false,
                      ),
                      ProviderRoute::Native
                  );
                  assert_eq!(
                      ProviderRoute::for_provider(
                          "openrouter",
                          "OpenRouter",
                          WireApi::Responses,
                          false,
                      ),
                      ProviderRoute::Compatibility
                  );
              }
          ''',
              "provider route tests",
          )
          branding.write_text(s)

          popup = Path("codex-rs/tui/src/chatwidget/model_popups.rs")
          s = popup.read_text()
          s = replace_once(
              s,
              '''    fn model_provider_route(&self) -> crate::branding::ProviderRoute {
                  if self.config.model_provider.is_openai() && self.custom_openai_base_url().is_none() {
                      crate::branding::ProviderRoute::Native
                  } else {
                      crate::branding::ProviderRoute::Compatibility
                  }
              }

              fn model_route_description(&self, description: &str) -> String {
          ''',
              '''    fn model_provider_route(&self) -> crate::branding::ProviderRoute {
                  crate::branding::ProviderRoute::for_provider(
                      &self.config.model_provider_id,
                      &self.config.model_provider.name,
                      self.config.model_provider.wire_api,
                      self.custom_openai_base_url().is_some(),
                  )
              }

              fn model_protocol_label(&self) -> String {
                  self.config.model_provider.wire_api.to_string()
              }

              fn model_credential_label(&self) -> String {
                  if self.config.model_provider.requires_openai_auth {
                      return "OpenAI/ChatGPT credential store".to_string();
                  }
                  if let Some(env_key) = self.config.model_provider.env_key.as_deref() {
                      return format!("environment variable {env_key}");
                  }
                  if let Some(headers) = self.config.model_provider.env_http_headers.as_ref()
                      && !headers.is_empty()
                  {
                      let mut env_names = headers.values().cloned().collect::<Vec<_>>();
                      env_names.sort();
                      env_names.dedup();
                      return format!("environment header {}", env_names.join(", "));
                  }
                  if self.config.model_provider.auth.is_some() {
                      return "command-backed bearer token".to_string();
                  }
                  if self.config.model_provider.aws.is_some() {
                      return "AWS SigV4 credential chain".to_string();
                  }
                  if self.config.model_provider.experimental_bearer_token.is_some() {
                      return "configured bearer token".to_string();
                  }
                  "not declared".to_string()
              }

              fn model_route_description(&self, description: &str) -> String {
          ''',
              "model provider route",
          )
          s = replace_once(
              s,
              '''        let provider = self.model_provider_display_name();
                  let route = self.model_provider_route().long_label();
                  let mut header = ColumnRenderable::new();
          ''',
              '''        let provider = self.model_provider_display_name();
                  let route = self.model_provider_route().long_label();
                  let protocol = self.model_protocol_label();
                  let credential = self.model_credential_label();
                  let mut header = ColumnRenderable::new();
          ''',
              "model menu metadata",
          )
          route_line = '''        header.push(Line::from(Span::styled(
                  format!("Route: {route}"),
                  crate::style::status_symbol_style(),
              )));
          '''
          s = replace_once(
              s,
              route_line,
              route_line + '''        header.push(Line::from(Span::styled(
                  format!("Protocol: {protocol}"),
                  crate::style::status_symbol_style(),
              )));
              header.push(Line::from(Span::styled(
                  format!("Credential: {credential}"),
                  crate::style::status_symbol_style(),
              )));
          ''',
              "model menu protocol and credential",
          )
          s = replace_once(
              s,
              '"Provider and route stay fixed; choose a quick model or browse the full catalog."',
              '"Provider, protocol, route, and credential source remain visible while choosing."',
              "model menu subtitle",
          )
          popup.write_text(s)

          protocol = Path("codex-rs/tui/src/chatwidget/protocol.rs")
          s = protocol.read_text()
          s = replace_once(
              s,
              '''        let provider_route = if self.config.model_provider.is_openai() && !custom_openai_base {
                  crate::branding::ProviderRoute::Native
              } else {
                  crate::branding::ProviderRoute::Compatibility
              };
          ''',
              '''        let provider_route = crate::branding::ProviderRoute::for_provider(
                  &self.config.model_provider_id,
                  &self.config.model_provider.name,
                  self.config.model_provider.wire_api,
                  custom_openai_base,
              );
          ''',
              "live provider route",
          )
          protocol.write_text(s)

          surfaces = Path("codex-rs/tui/src/chatwidget/status_surfaces.rs")
          s = surfaces.read_text()
          s = replace_once(
              s,
              '''    fn refresh_status_line_from_selections(&mut self, selections: &StatusSurfaceSelections) {
                  let enabled = !selections.status_line_items.is_empty();
                  self.bottom_pane.set_status_line_enabled(enabled);
                  if !enabled {
                      self.set_status_line(/*status_line*/ None);
                      self.set_status_line_hyperlink(/*url*/ None);
                      return;
                  }

                  let mut segments = Vec::new();
          ''',
              '''    fn refresh_status_line_from_selections(&mut self, selections: &StatusSurfaceSelections) {
                  let latest_eviction = crate::legacy_core::context_cleaner::latest_eviction_event();
                  crate::branding::sync_context_eviction(
                      crate::legacy_core::context_cleaner::eviction_count(),
                      latest_eviction.as_deref(),
                  );

                  // Elpis runtime identity remains visible even when the inherited configurable
                  // status-line item list is empty. User-selected items are appended as a tail.
                  self.bottom_pane.set_status_line_enabled(true);

                  let mut segments = Vec::new();
          ''',
              "persistent status line",
          )
          surfaces.write_text(s)
          PY

      - name: Format source
        working-directory: codex-rs
        run: cargo fmt --all

      - name: Verify focused product behavior
        working-directory: codex-rs
        run: |
          cargo fmt --all --check
          cargo test -p codex-core --lib --locked context_cleaner::tests
          cargo test -p codex-memories-write --locked reset_memory_workspace_baseline_
          cargo test -p codex-model-provider-info --locked
          cargo test -p codex-core --lib --locked chat_completions
          cargo test -p codex-tui --lib --locked branding::tests
          cargo test -p codex-tui --bin elpis --locked
          cargo build -p codex-tui --bin elpis --locked
          test "$(target/debug/elpis --version)" = "elpis 0.1.0"

      - name: Commit verified source and remove finalizer
        run: |
          git config user.name "elpis-integration-agent"
          git config user.email "elpis-integration-agent@users.noreply.github.com"
          git rm .github/workflows/integration-finalize.yml
          git add codex-rs/tui/src/branding.rs \
            codex-rs/tui/src/chatwidget/model_popups.rs \
            codex-rs/tui/src/chatwidget/protocol.rs \
            codex-rs/tui/src/chatwidget/status_surfaces.rs
          git commit -m "fix(ui): finalize provider-aware runtime surfaces"
          git push origin HEAD:agent/product-integration
