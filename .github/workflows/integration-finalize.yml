name: Finalize Elpis integration

on:
  push:
    branches:
      - agent/product-integration

permissions:
  contents: read

concurrency:
  group: elpis-integration-finalizer
  cancel-in-progress: true

jobs:
  retired:
    if: ${{ false }}
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Integration finalization now runs in Elpis Linux verification."
