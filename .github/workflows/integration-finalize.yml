name: One-shot integration source export

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: elpis-integration-source-export
  cancel-in-progress: true

jobs:
  export:
    if: github.head_ref == 'agent/product-integration'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout integration head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/product-integration

      - name: Package exact source files
        run: |
          tar -czf /tmp/elpis-integration-ui-source.tar.gz \
            codex-rs/tui/src/branding.rs \
            codex-rs/tui/src/chatwidget/model_popups.rs \
            codex-rs/tui/src/chatwidget/protocol.rs \
            codex-rs/tui/src/chatwidget/status_surfaces.rs

      - name: Upload exact source files
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: elpis-integration-ui-source
          path: /tmp/elpis-integration-ui-source.tar.gz
          if-no-files-found: error
          retention-days: 1
