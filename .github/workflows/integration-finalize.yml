name: Finalize Elpis integration

on:
  push:
    branches:
      - agent/product-integration
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: elpis-integration-finalizer
  cancel-in-progress: true

jobs:
  finalize:
    if: github.ref == 'refs/heads/agent/product-integration' || github.head_ref == 'agent/product-integration'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CARGO_INCREMENTAL: "1"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout integration head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/product-integration
          fetch-depth: 0

      - name: Install Linux build dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            bubblewrap \
            libcap-dev \
            libssl-dev \
            pkg-config

      - name: Install pinned Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install 1.95.0 --component rustfmt --no-self-update

      - name: Restore Cargo downloads
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: elpis-cargo-${{ runner.os }}-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: |
            elpis-cargo-${{ runner.os }}-

      - name: Restore incremental build outputs
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: codex-rs/target
          key: elpis-target-${{ runner.os }}-${{ hashFiles('codex-rs/rust-toolchain.toml') }}-${{ hashFiles('codex-rs/Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            elpis-target-${{ runner.os }}-${{ hashFiles('codex-rs/rust-toolchain.toml') }}-${{ hashFiles('codex-rs/Cargo.lock') }}-
            elpis-target-${{ runner.os }}-${{ hashFiles('codex-rs/rust-toolchain.toml') }}-

      - name: Materialize reviewed source fixes
        run: |
          cat .github/finalizer/chunk-* | base64 -d > /tmp/elpis-finalize-ui.py
          python3 /tmp/elpis-finalize-ui.py
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str, label: str) -> None:
              file = Path(path)
              text = file.read_text()
              if text.count(old) != 1:
                  raise RuntimeError(
                      f"expected one {label} in {path}, found {text.count(old)}"
                  )
              file.write_text(text.replace(old, new, 1))

          remote = "codex-rs/config/src/thread_config/remote.rs"
          replace_once(
              remote,
              "Ok(proto::WireApi::Responses) => WireApi::Responses,\n",
              "Ok(proto::WireApi::Responses) => WireApi::Responses,\n"
              "        Ok(proto::WireApi::AnthropicMessages) => WireApi::AnthropicMessages,\n"
              "        Ok(proto::WireApi::GeminiGenerateContent) => WireApi::GeminiGenerateContent,\n",
              "remote wire API decode arm",
          )
          replace_once(
              remote,
              "WireApi::Responses => proto::WireApi::Responses,\n",
              "WireApi::Responses => proto::WireApi::Responses,\n"
              "        WireApi::AnthropicMessages => proto::WireApi::AnthropicMessages,\n"
              "        WireApi::GeminiGenerateContent => proto::WireApi::GeminiGenerateContent,\n",
              "remote wire API encode arm",
          )
          replace_once(
              remote,
              "    fn proto_sources() -> Vec<proto::ThreadConfigSource> {\n",
              "    #[test]\n"
              "    fn native_wire_apis_roundtrip_through_remote_config() {\n"
              "        for wire_api in [\n"
              "            WireApi::AnthropicMessages,\n"
              "            WireApi::GeminiGenerateContent,\n"
              "        ] {\n"
              "            let mut expected = expected_provider();\n"
              "            expected.wire_api = wire_api;\n"
              "            let proto = model_provider_to_proto(\"native\", expected.clone());\n"
              "            let (id, actual) = model_provider_from_proto(proto)\n"
              "                .expect(\"native model provider from proto\");\n"
              "            assert_eq!(id, \"native\");\n"
              "            assert_eq!(actual, expected);\n"
              "        }\n"
              "    }\n\n"
              "    fn proto_sources() -> Vec<proto::ThreadConfigSource> {\n",
              "remote native wire API regression insertion point",
          )

          proto = "codex-rs/config/src/thread_config/proto/codex.thread_config.v1.proto"
          replace_once(
              proto,
              "  WIRE_API_RESPONSES = 1;\n",
              "  WIRE_API_RESPONSES = 1;\n"
              "  WIRE_API_ANTHROPIC_MESSAGES = 2;\n"
              "  WIRE_API_GEMINI_GENERATE_CONTENT = 3;\n",
              "protobuf wire API value",
          )

          generated = "codex-rs/config/src/thread_config/proto/codex.thread_config.v1.rs"
          replace_once(
              generated,
              "    Responses = 1,\n",
              "    Responses = 1,\n"
              "    AnthropicMessages = 2,\n"
              "    GeminiGenerateContent = 3,\n",
              "generated wire API variant",
          )
          replace_once(
              generated,
              "            Self::Responses => \"WIRE_API_RESPONSES\",\n",
              "            Self::Responses => \"WIRE_API_RESPONSES\",\n"
              "            Self::AnthropicMessages => \"WIRE_API_ANTHROPIC_MESSAGES\",\n"
              "            Self::GeminiGenerateContent => \"WIRE_API_GEMINI_GENERATE_CONTENT\",\n",
              "generated wire API name",
          )
          replace_once(
              generated,
              "            \"WIRE_API_RESPONSES\" => Some(Self::Responses),\n",
              "            \"WIRE_API_RESPONSES\" => Some(Self::Responses),\n"
              "            \"WIRE_API_ANTHROPIC_MESSAGES\" => Some(Self::AnthropicMessages),\n"
              "            \"WIRE_API_GEMINI_GENERATE_CONTENT\" => Some(Self::GeminiGenerateContent),\n",
              "generated wire API parser",
          )

          workflow = ".github/workflows/embedded-elpis-linux.yml"
          replace_once(
              workflow,
              "    if: github.head_ref != 'agent/product-integration'\n",
              "",
              "integration workflow skip",
          )
          PY
          cd codex-rs
          cargo fmt --all
          cargo fmt --all --check

      - name: Verify launcher and provider entrypoints
        working-directory: codex-rs
        run: cargo test -p codex-tui --bin elpis --locked

      - name: Verify context lifecycle and archive failure safety
        working-directory: codex-rs
        run: |
          cargo test -p codex-core --lib --locked context_cleaner::tests
          cargo test -p codex-memories-write --locked reset_memory_workspace_baseline_

      - name: Verify memory promotion, bounds, and retrieval
        working-directory: codex-rs
        run: |
          cargo test -p codex-state --locked record_stage1_output_usage_updates_usage_metadata
          cargo test -p codex-memories-write --locked sync_rollout_summaries_and_raw_memories_file_keeps_latest_memories_only
          cargo test -p codex-memories-write --locked validate_consolidation_artifacts_
          cargo test -p codex-config --locked memories_config_preserves_configured_root
          cargo test -p codex-state --locked init_with_memories_state_root_separates_only_memories_db
          cargo test -p codex-memories-extension --locked local::search::tests

      - name: Verify provider protocol and authentication boundaries
        working-directory: codex-rs
        run: |
          cargo test -p codex-model-provider-info --locked
          cargo test -p codex-core --lib --locked chat_completions

      - name: Verify runtime identity surfaces
        working-directory: codex-rs
        run: cargo test -p codex-tui --lib --locked branding::tests

      - name: Build and verify executable identity
        working-directory: codex-rs
        run: |
          cargo build -p codex-tui --bin elpis --locked
          target/debug/elpis --help
          test "$(target/debug/elpis --version)" = "elpis 0.1.0"

      - name: Commit verified source and remove temporary machinery
        run: |
          git config user.name "elpis-integration-agent"
          git config user.email "elpis-integration-agent@users.noreply.github.com"
          git rm .github/workflows/integration-finalize.yml \
            .github/patches/elpis-ui-final.patch
          git rm -r .github/finalizer
          git add .github/workflows/embedded-elpis-linux.yml \
            codex-rs/config/src/thread_config/remote.rs \
            codex-rs/config/src/thread_config/proto/codex.thread_config.v1.proto \
            codex-rs/config/src/thread_config/proto/codex.thread_config.v1.rs \
            codex-rs/tui/src/branding.rs \
            codex-rs/tui/src/chatwidget/model_popups.rs \
            codex-rs/tui/src/chatwidget/protocol.rs \
            codex-rs/tui/src/chatwidget/status_surfaces.rs
          git diff --cached --check
          git commit -m "fix: finalize integration verification"
          git push origin HEAD:agent/product-integration
