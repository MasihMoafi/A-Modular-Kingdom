name: Provider routing validation

on:
  push:
    branches:
      - agent/provider-routing
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/provider-routing

      - name: Apply production provider routing changes
        run: |
          cat .github/provider-routing-patch/part*.b64 \
            | base64 --decode \
            | gzip --decompress \
            > /tmp/provider-routing.patch
          if ! git apply --index --whitespace=nowarn /tmp/provider-routing.patch > /tmp/base-apply.log 2>&1; then
            cat /tmp/base-apply.log
            exit 1
          fi
          python3 <<'PY'
          from pathlib import Path

          cargo = Path("codex-rs/model-provider/Cargo.toml")
          text = cargo.read_text()
          dependency = 'serde_json = { workspace = true }\n'
          dev_marker = '[dev-dependencies]\npretty_assertions = { workspace = true }\n' + dependency
          if dev_marker in text:
              text = text.replace(
                  dev_marker,
                  '[dev-dependencies]\npretty_assertions = { workspace = true }\n',
                  1,
              )
          if dependency not in text.split('[dev-dependencies]', 1)[0]:
              marker = 'http = { workspace = true }\n'
              if marker not in text:
                  raise RuntimeError('model-provider dependency insertion marker missing')
              text = text.replace(marker, marker + dependency, 1)
          cargo.write_text(text)

          provider = Path("codex-rs/model-provider/src/provider.rs")
          text = provider.read_text()
          bad = (
              '    use codex_protocol::openai_models::ModelInfo;\n'
              '    use codex_protocol::openai_models::ModelInfo;\n'
              'use codex_protocol::openai_models::ModelsResponse;\n'
          )
          good = (
              '    use codex_protocol::openai_models::ModelInfo;\n'
              '    use codex_protocol::openai_models::ModelsResponse;\n'
          )
          if bad in text:
              text = text.replace(bad, good, 1)
          elif text.count('use codex_protocol::openai_models::ModelInfo;') != 2:
              raise RuntimeError('unexpected ModelInfo import shape after provider patch')
          provider.write_text(text)
          PY
          git add codex-rs/model-provider/Cargo.toml codex-rs/model-provider/src/provider.rs
          git diff --cached > /tmp/provider-staged.diff

      - name: Format production source
        working-directory: codex-rs
        run: cargo fmt --all

      - name: Check formatting
        working-directory: codex-rs
        run: cargo fmt --all --check

      - name: Test provider metadata
        working-directory: codex-rs
        run: cargo test -p codex-model-provider-info --locked

      - name: Test native provider boundaries
        working-directory: codex-rs
        run: |
          if ! cargo test -p codex-model-provider --locked native_ > /tmp/native-provider.log 2>&1; then
            tail -n 240 /tmp/native-provider.log
            exit 1
          fi
          tail -n 80 /tmp/native-provider.log

      - name: Test provider request translation
        working-directory: codex-rs
        run: |
          if ! cargo test -p codex-core --lib --locked chat_completions > /tmp/provider-core.log 2>&1; then
            tail -n 300 /tmp/provider-core.log
            exit 1
          fi
          tail -n 100 /tmp/provider-core.log

      - name: Test Elpis TUI
        working-directory: codex-rs
        run: cargo test -p codex-tui --bin elpis --locked

      - name: Build Elpis
        working-directory: codex-rs
        run: cargo build -p codex-tui --bin elpis --locked

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: provider-routing-diagnostics
          path: |
            /tmp/base-apply.log
            /tmp/provider-staged.diff
            /tmp/provider-routing.patch
            /tmp/native-provider.log
            /tmp/provider-core.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Commit validated production files
        if: github.event_name == 'push' && success()
        run: |
          rm -rf .github/provider-routing-patch
          rm .github/workflows/provider-routing-agent.yml
          git add -A
          git diff --cached --check
          git config user.name "Agent C"
          git config user.email "agent-c@users.noreply.github.com"
          git commit -m "feat: add native Anthropic and Gemini provider routing"
          git push origin HEAD:agent/provider-routing
