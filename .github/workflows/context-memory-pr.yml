name: Verify and commit context specialist

on:
  pull_request:
    branches:
      - agent/product-integration

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/context-memory
          fetch-depth: 0

      - name: Apply production source changes
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          source = Path('.github/workflows/context-memory-apply.yml').read_text()

          cleaner_start = source.index("          cleaner = r'''use codex_protocol") + len("          cleaner = r'''")
          cleaner_end = source.index("\n          '''\n", cleaner_start)
          cleaner = source[cleaner_start:cleaner_end]
          cleaner = "\n".join(line[10:] if line.startswith("          ") else line for line in cleaner.splitlines()) + "\n"
          Path('codex-rs/core/src/context_cleaner.rs').write_text(cleaner)

          client = Path('codex-rs/core/src/client.rs')
          text = client.read_text()
          import_line = 'use crate::context_cleaner::clean_transient_tool_outputs;\n'
          if import_line not in text:
              marker = 'use crate::client_common::ResponseStream;\n'
              if marker not in text:
                  raise RuntimeError('client import marker missing')
              text = text.replace(marker, marker + import_line, 1)

          pattern = re.compile(
              r"        if !store \{\n            for item in input\.iter_mut\(\) \{.*?\n        \}\n\n        if self\.state\.item_ids_enabled",
              re.S,
          )
          replacement = (
              "        if !store {\n"
              "            clean_transient_tool_outputs(input);\n"
              "        }\n\n"
              "        if self.state.item_ids_enabled"
          )
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1 and 'clean_transient_tool_outputs(input);' not in text:
              raise RuntimeError(f'context cleaner request hunk matched {count} times')
          client.write_text(text)

          lib = Path('codex-rs/core/src/lib.rs')
          text = lib.read_text()
          export = 'pub mod context_cleaner;\n'
          if export not in text:
              marker = 'mod context_manager;\n'
              if marker not in text:
                  raise RuntimeError('core module marker missing')
              text = text.replace(marker, marker + export, 1)
          lib.write_text(text)

          test_start = source.index("          test = r'''#[tokio::test]") + len("          test = r'''")
          test_end = source.index("\n          '''\n", test_start)
          test = source[test_start:test_end]
          test = "\n".join(line[10:] if line.startswith("          ") else line for line in test.splitlines()) + "\n\n"
          tests = Path('codex-rs/memories/write/src/workspace_tests.rs')
          text = tests.read_text()
          if 'reset_memory_workspace_baseline_propagates_archive_write_failure' not in text:
              marker = '#[tokio::test]\nasync fn prepare_memory_workspace_recovers_unusable_git_dir()'
              if marker not in text:
                  raise RuntimeError('memory test insertion marker missing')
              text = text.replace(marker, test + marker, 1)
          tests.write_text(text)
          PY

      - name: Install dependencies and Rust
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libcap-dev libssl-dev pkg-config
          rustup set profile minimal
          rustup toolchain install 1.95.0 --component rustfmt --no-self-update

      - name: Format and run focused tests
        working-directory: codex-rs
        run: |
          cargo fmt --all
          cargo fmt --all --check
          cargo test -p codex-core --lib --locked context_cleaner::tests
          cargo test -p codex-memories-write --locked reset_memory_workspace_baseline_

      - name: Commit verified production source and remove bootstraps
        run: |
          rm .github/workflows/context-memory-apply.yml .github/workflows/context-memory-pr.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add codex-rs/core/src/client.rs codex-rs/core/src/context_cleaner.rs codex-rs/core/src/lib.rs codex-rs/memories/write/src/workspace_tests.rs .github/workflows/context-memory-apply.yml .github/workflows/context-memory-pr.yml
          git commit -m "feat(context): compact older transient evidence safely"
          git push origin HEAD:agent/context-memory
