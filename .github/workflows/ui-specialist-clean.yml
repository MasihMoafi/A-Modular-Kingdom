name: Clean and verify UI specialist

on:
  pull_request:
    branches:
      - agent/product-integration

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/ui-ux
          fetch-depth: 0

      - name: Rebase reviewed production UI onto integration
        shell: bash
        run: |
          set -euo pipefail
          files=(
            codex-rs/tui/src/bottom_pane/status_line_style.rs
            codex-rs/tui/src/branding.rs
            codex-rs/tui/src/chatwidget/model_popups.rs
            codex-rs/tui/src/chatwidget/protocol.rs
            codex-rs/tui/src/slash_command.rs
          )
          for file in "${files[@]}"; do
            mkdir -p "/tmp/ui-source/$(dirname "$file")"
            cp "$file" "/tmp/ui-source/$file"
          done
          git fetch origin agent/product-integration
          git checkout -B agent/ui-ux origin/agent/product-integration
          for file in "${files[@]}"; do
            cp "/tmp/ui-source/$file" "$file"
          done

      - name: Wire persistent identity and provider-aware model surface
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          branding = Path('codex-rs/tui/src/branding.rs')
          text = branding.read_text()
          text = text.replace('Self::Native => "native Responses route",', 'Self::Native => "native provider route",')
          text = text.replace('Self::Compatibility => "OpenAI-compatible Responses route",', 'Self::Compatibility => "OpenAI-compatible gateway route",')
          if 'pub(crate) fn for_provider(' not in text:
              marker = '''    pub(crate) fn long_label(self) -> &'static str {
                  match self {
                      Self::Native => "native provider route",
                      Self::Compatibility => "OpenAI-compatible gateway route",
                  }
              }
          '''
              replacement = marker + '''
              pub(crate) fn for_provider(
                  provider_id: &str,
                  is_openai: bool,
                  custom_openai_base: bool,
              ) -> Self {
                  match provider_id.trim().to_ascii_lowercase().as_str() {
                      "openrouter" => Self::Compatibility,
                      "openai" | "anthropic" | "google" | "gemini" => Self::Native,
                      _ if is_openai && !custom_openai_base => Self::Native,
                      _ => Self::Compatibility,
                  }
              }
          '''
              if marker not in text:
                  raise RuntimeError('provider route implementation marker missing')
              text = text.replace(marker, replacement, 1)
          if 'pub(crate) fn sync_context_eviction(' not in text:
              marker = 'pub(crate) fn record_context_usage(last_total_tokens: i64, context_window: Option<i64>) {\n'
              insert = '''pub(crate) fn sync_context_eviction(count: usize, event: Option<&str>) {
              if count == 0 {
                  return;
              }
              mutate_runtime_identity(|state| {
                  let evidence = event
                      .and_then(|value| value.rsplit_once("exact evidence: ").map(|(_, pointer)| pointer))
                      .map(str::trim)
                      .filter(|pointer| !pointer.is_empty())
                      .unwrap_or("rollout://unavailable")
                      .to_string();
                  state.eviction_count = state.eviction_count.max(count as u64);
                  state.latest_eviction = Some(EvictionNotice {
                      count: state.eviction_count,
                      reason: "transient evidence compaction".to_string(),
                      evidence,
                  });
                  if let Some(event) = event {
                      state.latest_continuity = Some(event.to_string());
                  }
              });
          }

          '''
              if marker not in text:
                  raise RuntimeError('context usage marker missing')
              text = text.replace(marker, insert + marker, 1)
          old = '''    if let Some(continuity) = state.latest_continuity.as_deref() {
              push_field(
                  &mut spans,
                  "flow",
                  continuity,
                  crate::style::status_symbol_style(),
              );
          }
          '''
          new = '''    if let Some(latest) = state.latest_eviction.as_ref() {
              push_field(
                  &mut spans,
                  "evidence",
                  &latest.evidence,
                  crate::style::status_symbol_style(),
              );
          }
          if let Some(continuity) = state.latest_continuity.as_deref() {
              push_field(
                  &mut spans,
                  "flow",
                  continuity,
                  crate::style::status_symbol_style(),
              );
          }
          '''
          if old not in text:
              raise RuntimeError('identity evidence insertion marker missing')
          text = text.replace(old, new, 1)
          text = text.replace('"native Responses route"', '"native provider route"')
          text = text.replace('"OpenAI-compatible Responses route"', '"OpenAI-compatible gateway route"')
          branding.write_text(text)

          protocol = Path('codex-rs/tui/src/chatwidget/protocol.rs')
          text = protocol.read_text()
          old = '''        let provider_route = if self.config.model_provider.is_openai() && !custom_openai_base {
              crate::branding::ProviderRoute::Native
          } else {
              crate::branding::ProviderRoute::Compatibility
          };
          '''
          new = '''        let provider_route = crate::branding::ProviderRoute::for_provider(
              &self.config.model_provider_id,
              self.config.model_provider.is_openai(),
              custom_openai_base,
          );
          '''
          if old not in text:
              raise RuntimeError('protocol provider route marker missing')
          protocol.write_text(text.replace(old, new, 1))

          status = Path('codex-rs/tui/src/chatwidget/status_surfaces.rs')
          text = status.read_text()
          old = '''        let enabled = !selections.status_line_items.is_empty();
              self.bottom_pane.set_status_line_enabled(enabled);
              if !enabled {
                  self.set_status_line(/*status_line*/ None);
                  self.set_status_line_hyperlink(/*url*/ None);
                  return;
              }

          '''
          new = '''        crate::branding::sync_context_eviction(
              codex_core::context_cleaner::eviction_count(),
              codex_core::context_cleaner::latest_eviction_event().as_deref(),
          );
              // Elpis identity remains visible even when no optional status segments are selected.
              self.bottom_pane.set_status_line_enabled(true);

          '''
          if old not in text:
              raise RuntimeError('status-line persistence marker missing')
          status.write_text(text.replace(old, new, 1))

          models = Path('codex-rs/tui/src/chatwidget/model_popups.rs')
          text = models.read_text()
          old = '''    fn model_provider_route(&self) -> crate::branding::ProviderRoute {
              if self.config.model_provider.is_openai() && self.custom_openai_base_url().is_none() {
                  crate::branding::ProviderRoute::Native
              } else {
                  crate::branding::ProviderRoute::Compatibility
              }
          }
          '''
          new = '''    fn model_provider_route(&self) -> crate::branding::ProviderRoute {
              crate::branding::ProviderRoute::for_provider(
                  &self.config.model_provider_id,
                  self.config.model_provider.is_openai(),
                  self.custom_openai_base_url().is_some(),
              )
          }
          '''
          if old not in text:
              raise RuntimeError('model picker provider route marker missing')
          text = text.replace(old, new, 1)
          pattern = re.compile(
              r'''    fn model_menu_header\(&self, title: &str, subtitle: &str\) -> Box<dyn Renderable> \{.*?\n    \}\n\n    fn model_menu_warning_line''',
              re.S,
          )
          replacement = '''    fn model_menu_header(&self, title: &str, subtitle: &str) -> Box<dyn Renderable> {
              let provider = self.model_provider_display_name();
              let protocol = self.config.model_provider.wire_api.to_string();
              let route = self.model_provider_route().long_label();
              let mut credential_envs = self
                  .config
                  .model_provider
                  .env_http_headers
                  .as_ref()
                  .map(|headers| headers.values().cloned().collect::<Vec<_>>())
                  .unwrap_or_default();
              credential_envs.sort();
              let credential = self
                  .config
                  .model_provider
                  .env_key
                  .clone()
                  .or_else(|| credential_envs.into_iter().next())
                  .unwrap_or_else(|| {
                      if self.config.model_provider.requires_openai_auth {
                          "OpenAI login/API key".to_string()
                      } else {
                          "configured provider auth".to_string()
                      }
                  });
              let mut header = ColumnRenderable::new();
              header.push(Line::from(
                  title.to_string().style(crate::style::brand_style()),
              ));
              header.push(Line::from(
                  format!("Provider: {provider}").style(crate::style::status_symbol_style()),
              ));
              header.push(Line::from(
                  format!("Protocol: {protocol}").style(crate::style::status_symbol_style()),
              ));
              header.push(Line::from(
                  format!("Route: {route}").style(crate::style::status_symbol_style()),
              ));
              header.push(Line::from(
                  format!("Current model: {}", self.current_model()).bold(),
              ));
              header.push(Line::from(
                  format!("Credential: {credential}").dim(),
              ));
              header.push(Line::from(subtitle.to_string().dim()));
              if let Some(warning) = self.model_menu_warning_line() {
                  header.push(warning);
              }
              Box::new(header)
          }

          fn model_menu_warning_line'''
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise RuntimeError(f'model picker header matched {count} times')
          text = text.replace('"Choose a model",', '"Choose an Elpis model",', 1)
          models.write_text(text)
          PY

      - name: Install dependencies and Rust
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libcap-dev libssl-dev pkg-config
          rustup set profile minimal
          rustup toolchain install 1.95.0 --component rustfmt --no-self-update

      - name: Format and verify production UI
        working-directory: codex-rs
        run: |
          cargo fmt --all
          cargo fmt --all --check
          cargo test -p codex-tui --lib --locked branding::tests
          cargo test -p codex-tui --bin elpis --locked
          cargo check -p codex-tui --locked

      - name: Commit clean specialist branch
        run: |
          git config user.name "Agent UI"
          git config user.email "agent-ui@users.noreply.github.com"
          git add codex-rs/tui/src/bottom_pane/status_line_style.rs \
            codex-rs/tui/src/branding.rs \
            codex-rs/tui/src/chatwidget/model_popups.rs \
            codex-rs/tui/src/chatwidget/protocol.rs \
            codex-rs/tui/src/chatwidget/status_surfaces.rs \
            codex-rs/tui/src/slash_command.rs
          git diff --cached --check
          git commit -m "feat(tui): wire persistent Elpis runtime identity"
          git push --force origin HEAD:agent/ui-ux
