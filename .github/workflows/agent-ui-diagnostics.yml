name: Agent UI compiler diagnostics

on:
  pull_request:
    paths:
      - .github/workflows/agent-ui-diagnostics.yml

permissions:
  actions: read
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    steps:
      - name: Extract failed compiler log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --location --silent --show-error \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/87855107371/logs" \
            --output /tmp/job.log
          tail -n 220 /tmp/job.log > /tmp/compiler-tail.log

      - name: Upload compiler diagnostics
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: agent-ui-compiler-tail
          path: /tmp/compiler-tail.log
          if-no-files-found: error
          retention-days: 1
