name: Apply UI compiler fix

on:
  push:
    branches:
      - agent/ui-ux
    paths:
      - .github/workflows/agent-ui-diagnostics.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout UI branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/ui-ux
          fetch-depth: 0

      - name: Add required ratatui styling trait
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('codex-rs/tui/src/chatwidget/model_popups.rs')
          text = path.read_text()
          marker = 'use super::*;\n'
          addition = 'use ratatui::style::Styled;\n'
          if addition not in text:
              if text.count(marker) != 1:
                  raise SystemExit('unexpected model_popups import layout')
              text = text.replace(marker, marker + addition, 1)
              path.write_text(text)
          PY

      - name: Format with pinned toolchain
        working-directory: codex-rs
        run: |
          rustup set profile minimal
          rustup toolchain install 1.95.0 --component rustfmt --no-self-update
          cargo fmt --all
          cargo fmt --all --check

      - name: Commit production fix and remove helper
        run: |
          rm .github/workflows/agent-ui-diagnostics.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add codex-rs/tui/src/chatwidget/model_popups.rs .github/workflows/agent-ui-diagnostics.yml
          git commit -m "Fix model popup styling import"
          git push origin HEAD:agent/ui-ux
