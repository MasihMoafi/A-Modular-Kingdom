name: Agent UI rustfmt

on:
  push:
    branches:
      - agent/ui-ux

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/ui-ux
          fetch-depth: 0

      - name: Install pinned rustfmt
        run: |
          rustup set profile minimal
          rustup toolchain install 1.95.0 --component rustfmt --no-self-update

      - name: Format production Rust
        run: cargo fmt --all

      - name: Commit formatter output
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add codex-rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format Elpis TUI changes"
          git push origin HEAD:agent/ui-ux
