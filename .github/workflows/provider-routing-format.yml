name: Format provider routing branch

on:
  push:
    branches:
      - agent/provider-routing

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/provider-routing
          fetch-depth: 0

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          components: rustfmt

      - name: Format workspace
        working-directory: codex-rs
        run: cargo fmt --all

      - name: Commit formatting and remove helper
        run: |
          git config user.name "provider-routing-agent"
          git config user.email "provider-routing-agent@users.noreply.github.com"
          git rm .github/workflows/provider-routing-format.yml
          git add -A
          git commit -m "style: format native provider routing"
          git push origin HEAD:agent/provider-routing
