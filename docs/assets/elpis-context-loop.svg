<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Elpis context continuity loop</title>
  <desc id="desc">Exact evidence is projected into a small model-visible working set. Verified work is written back to durable evidence, while bounded memory is recalled selectively.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0b09"/>
      <stop offset="1" stop-color="#15110a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#d6a94f"/>
    </marker>
    <style>
      .label { font: 700 22px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #f8f2e7; letter-spacing: .5px; }
      .body { font: 400 16px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #b9b0a1; }
      .micro { font: 600 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #d6a94f; letter-spacing: 1.2px; text-transform: uppercase; }
      .title { font: 800 34px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #fff8eb; letter-spacing: .3px; }
      .subtitle { font: 400 17px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #a79e90; }
      .box { fill: #14110d; stroke: #3b3020; stroke-width: 1.5; }
      .box-accent { fill: #171208; stroke: #d6a94f; stroke-width: 2; }
      .connector { fill: none; stroke: #76603b; stroke-width: 2; marker-end: url(#arrow); }
      .connector-accent { fill: none; stroke: #d6a94f; stroke-width: 2.5; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="680" rx="28" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="678" rx="27" fill="none" stroke="#2b2419"/>
  <text x="70" y="72" class="micro">ELPIS · CONTINUITY MODEL</text>
  <text x="70" y="116" class="title">Keep evidence exact. Keep context small.</text>
  <text x="70" y="148" class="subtitle">Only the material needed to decide and act enters the next model request.</text>
  <rect x="70" y="220" width="250" height="178" rx="18" class="box"/>
  <rect x="475" y="205" width="250" height="208" rx="18" class="box-accent"/>
  <rect x="880" y="220" width="250" height="178" rx="18" class="box"/>
  <text x="98" y="258" class="micro">SOURCE OF TRUTH</text>
  <text x="98" y="294" class="label">Exact evidence</text>
  <text x="98" y="329" class="body">workspace files</text>
  <text x="98" y="354" class="body">tool output · transcripts</text>
  <text x="98" y="379" class="body">commands · diffs · tests</text>
  <text x="503" y="244" class="micro">ELPIS-OWNED BOUNDARY</text>
  <text x="503" y="280" class="label">Context projection</text>
  <text x="503" y="315" class="body">active goal + checkpoint</text>
  <text x="503" y="340" class="body">selected evidence + reasons</text>
  <text x="503" y="365" class="body">lifetimes + expiration</text>
  <rect x="503" y="382" width="192" height="4" rx="2" fill="url(#amber)" filter="url(#glow)"/>
  <text x="908" y="258" class="micro">NEXT REQUEST</text>
  <text x="908" y="294" class="label">Working set</text>
  <text x="908" y="329" class="body">small · explicit · inspectable</text>
  <text x="908" y="354" class="body">goal · constraints · next action</text>
  <text x="908" y="379" class="body">recent evidence, not history</text>
  <path d="M320 309 C378 309 405 309 475 309" class="connector-accent"/>
  <text x="347" y="291" class="micro">SELECT</text>
  <path d="M725 309 C783 309 810 309 880 309" class="connector-accent"/>
  <text x="752" y="291" class="micro">ADMIT</text>
  <rect x="475" y="500" width="250" height="112" rx="18" class="box"/>
  <text x="503" y="538" class="micro">AFTER THE TURN</text>
  <text x="503" y="572" class="label">Verified work</text>
  <text x="503" y="598" class="body">result · changed paths · evidence · next action</text>
  <path d="M1005 398 C1005 475 839 556 725 556" class="connector"/>
  <text x="865" y="494" class="micro">ACT + VERIFY</text>
  <path d="M475 556 C390 556 195 500 195 398" class="connector"/>
  <text x="330" y="492" class="micro">WRITE BACK</text>
  <rect x="70" y="500" width="250" height="112" rx="18" class="box"/>
  <text x="98" y="538" class="micro">SELECTIVE SIDECAR</text>
  <text x="98" y="572" class="label">Bounded memory</text>
  <text x="98" y="598" class="body">recalled only when relevant</text>
  <path d="M320 556 C375 556 420 470 502 413" class="connector"/>
  <text x="348" y="544" class="micro">RECALL</text>
  <text x="600" y="650" text-anchor="middle" class="micro">Exact resume and lean continuation use the same durable state.</text>
</svg>